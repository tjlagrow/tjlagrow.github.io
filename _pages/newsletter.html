<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <!-- HEADER -->
      <div class="text-center mb-5">
        <h1 class="display-4 fw-bold mb-3">Stay Ahead in Tech</h1>
        <p class="lead text-muted">Join the community for the latest insights in Machine Learning, AI, and emerging
          tech.</p>
      </div>

      <!-- FORM CARD -->
      <div class="card shadow-lg border-0 glass overflow-hidden">
        <div class="card-body p-4 p-md-5">

          <form id="newsletter-form"
            action="https://docs.google.com/forms/d/e/1FAIpQLSfBmeW8cXwmdtFsoklqFzIDuMIyyJn1Z90Jkcaz4Cc6RyPdVw/formResponse"
            method="POST" target="hidden_iframe">

            <!-- Full Name -->
            <div class="mb-4">
              <label for="fullname" class="form-label fw-bold">Full Name</label>
              <input type="text" class="form-control form-control-lg" id="fullname" name="entry.1114919543"
                placeholder="John Doe" required>
            </div>

            <!-- Email -->
            <div class="mb-4">
              <label for="email" class="form-label fw-bold">Email Address <span class="text-danger">*</span></label>
              <input type="email" class="form-control form-control-lg" id="email" name="entry.281224932"
                placeholder="name@example.com" required>
            </div>

            <!-- Role -->
            <div class="mb-4">
              <label for="role" class="form-label fw-bold">Select Your Role</label>
              <select class="form-select form-select-lg" id="role" name="entry.135313841">
                <option value="" selected disabled>Choose...</option>
                <option value="Student">Student</option>
                <option value="Researcher">Researcher</option>
                <option value="Software Engineer">Software Engineer</option>
                <option value="Data Scientist">Data Scientist</option>
                <option value="AI/ML Engineer">AI/ML Engineer</option>
                <option value="Business Learder/Manager">Business Leader/Manager</option>
                <option value="Enthusiast/Hobbyist">Enthusiast/Hobbyist</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <!-- Topics (Checkboxes) -->
            <div class="mb-4">
              <label class="form-label fw-bold">Interests</label>
              <div class="row g-2">
                <div class="col-sm-6">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="entry.1417986779" value="AI (General)"
                      id="topic1">
                    <label class="form-check-label" for="topic1">AI (General)</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="entry.1417986779" value="ML Algorithms"
                      id="topic2">
                    <label class="form-check-label" for="topic2">ML Algorithms</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="entry.1417986779" value="Deep Learning"
                      id="topic3">
                    <label class="form-check-label" for="topic3">Deep Learning</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="entry.1417986779" value="NLP" id="topic4">
                    <label class="form-check-label" for="topic4">NLP</label>
                  </div>
                </div>
                <div class="col-sm-6">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="entry.1417986779" value="Computer Vision"
                      id="topic5">
                    <label class="form-check-label" for="topic5">Computer Vision</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="entry.1417986779" value="Robotics"
                      id="topic6">
                    <label class="form-check-label" for="topic6">Robotics</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="entry.1417986779" value="Ethics in AI"
                      id="topic7">
                    <label class="form-check-label" for="topic7">Ethics in AI</label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Submit -->
            <div class="d-grid mt-5">
              <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                Subscribe
              </button>
            </div>

            <div id="form-message" class="mt-3 text-center" style="display:none;"></div>

          </form>

          <!-- Hidden Iframe for submission -->
          <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"
            onload="if(submitted) {document.getElementById('newsletter-form').reset(); document.getElementById('form-message').style.display='block'; document.getElementById('form-message').innerHTML='<div class=\'alert alert-success\'>Thanks for subscribing!</div>'; document.getElementById('submit-btn').disabled=false; document.getElementById('submit-btn').innerHTML='Subscribe';}"></iframe>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  var submitted = false;
  document.getElementById('newsletter-form').onsubmit = function () {
    submitted = true;
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Subscribing...';
  };
</script>
