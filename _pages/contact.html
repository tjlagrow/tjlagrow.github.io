<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">

      <!-- Contact Card -->
      <div class="card border-0 shadow-lg"
        style="background: rgba(17, 94, 89, 0.85); border: 1px solid rgba(204, 251, 241, 0.1); border-radius: 1rem; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">

        <div class="card-body p-4 p-md-5">

          <!-- Header -->
          <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-light mb-3">Get in Touch</h1>
            <p class="lead text-light opacity-75">
              Available for speaking, research collaborations, or just a thoughtful conversation about the future of AI
              and neuroscience.
            </p>
          </div>

          <!-- Social Quick Links -->
          <div class="row justify-content-center mb-5 gx-3">
            <div class="col-auto">
              <a href="https://github.com/tjlagrow" target="_blank"
                class="text-info opacity-75 hover-opacity-100 transition-base">
                <i class="fa fa-github fa-2x"></i>
              </a>
            </div>
            <div class="col-auto">
              <a href="https://www.linkedin.com/in/tjlagrow/" target="_blank"
                class="text-info opacity-75 hover-opacity-100 transition-base">
                <i class="fa fa-linkedin-square fa-2x"></i>
              </a>
            </div>
            <div class="col-auto">
              <a href="https://scholar.google.com/citations?user=P_3j-0kAAAAJ&hl=en" target="_blank"
                class="text-info opacity-75 hover-opacity-100 transition-base">
                <i class="fa fa-graduation-cap fa-2x"></i>
              </a>
            </div>
            <div class="col-auto">
              <a href="https://www.youtube.com/channel/UCQvfDUNkyesFOPReH37r7QA" target="_blank"
                class="text-info opacity-75 hover-opacity-100 transition-base">
                <i class="fa fa-youtube-play fa-2x"></i>
              </a>
            </div>
          </div>

          <!-- The Form -->
          <form action="https://formspree.io/f/xreakloy" method="POST" class="needs-validation" novalidate>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="form-floating text-dark">
                  <input type="text" class="form-control bg-light opacity-90 border-0" id="name" name="name"
                    placeholder="Your Name" required>
                  <label for="name">Name</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating text-dark">
                  <input type="email" class="form-control bg-light opacity-90 border-0" id="email" name="email"
                    placeholder="name@example.com" required>
                  <label for="email">Email address</label>
                </div>
              </div>

              <div class="col-12">
                <div class="form-floating text-dark">
                  <input type="text" class="form-control bg-light opacity-90 border-0" id="subject" name="subject"
                    placeholder="Subject">
                  <label for="subject">Subject</label>
                </div>
              </div>

              <div class="col-12">
                <div class="form-floating text-dark">
                  <textarea class="form-control bg-light opacity-90 border-0" placeholder="Leave a message here"
                    id="message" name="message" style="height: 150px" required></textarea>
                  <label for="message">Message</label>
                </div>
              </div>

              <div class="col-12 mt-4 text-center">
                <button type="submit" class="btn btn-info btn-lg px-5 py-3 rounded-pill fw-bold shadow-sm hover-lift">
                  Send Message
                </button>
              </div>
            </div>
          </form>

        </div>
      </div>



    </div>
