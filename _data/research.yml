    - https://www.biorxiv.org/content/10.1101/2026.01.02.697199
  abstract: 'Systematically evaluates how scan parameters (duration, TR) and frequency bands affect the reliability of spatiotemporal patterns (QPPs, cPCA). Finds that QPPs are robust in shorter scans while cPCA requires longer durations, and that frequency choice (Slow-4 vs Slow-5) significantly alters detected network dynamics.'
