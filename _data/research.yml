  keywords:
  - Alzheimer's
  - longitudinal
  - functional networks
  - EMBC
  links: []
  abstract: 'Investigates the role of Quasi-Periodic Patterns (QPPs) in identifying disease-related connectivity changes across Alzheimer''s Disease stages. The study finds a progressive decline in functional connectivity integrity, with early impairments in subcortical and executive networks, followed by widespread disconnection in higher cognition, sensorimotor, and visual networks.'
