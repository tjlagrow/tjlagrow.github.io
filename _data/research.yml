  links:
  - - Full Text
    - https://www.frontiersin.org/articles/10.3389/fnins.2020.550923/full
  - - DOI
    - https://doi.org/10.3389/fnins.2020.550923
  - - PMC
    - https://pmc.ncbi.nlm.nih.gov/articles/PMC7522447/
  abstract: 'Using Human Connectome Project data, the authors test whether parcel-wise
    complexity metrics (correlation dimension, approximate entropy, Lyapunov exponent)
    mainly reflect neural dynamics or are driven by basic BOLD properties. They find
    these complexity measures are reliable across scans and strongly tied to each
    region’s frequency profile, indicating that frequency content can confound interpretations
    of “complexity” in rs-fMRI.

