  abstract: 'Review of resting-state fMRI features across rodents and humans, comparing
    acquisition, preprocessing, and analysis choices that influence functional connectivity.
    The paper surveys time-averaged and time-varying metrics (e.g., sliding windows,
    quasi-periodic and co-activation patterns), links them to structural connectivity,
    and discusses applications to neurological and psychiatric disorders. It closes
    with open problems to make rodent-to-human translation more reliable.

