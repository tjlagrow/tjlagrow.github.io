  - functional connectivity
  links: []
  abstract: 'Investigates white matter (WM) functional connectivity in schizophrenia using a robust multi-scale WM intrinsic connectivity network (ICN) template. The study reveals significant dysconnectivity in subcortical-paralimbic, sensorimotor, and frontal networks, underscoring WM''s critical role in maintaining functional network stability.'
- title: Widespread Spatiotemporal Patterns of Functional Brain Networks in Longitudinal
