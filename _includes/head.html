<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Website of Theodore J. LaGrow - Researcher, Educator, ML Practitioner">
    <meta name="author" content="Theodore J. LaGrow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description"
        content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:image" content="{{ site.url }}/images/tlagrow_hs_01.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ site.url }}{{ page.url }}">
    <meta property="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="twitter:description"
        content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta property="twitter:image" content="{{ site.url }}/images/tlagrow_hs_01.jpg">

    <!-- Theme Color -->
    <meta name="theme-color" content="#191919">

    <link rel="shortcut icon" type="image/png" href="{{ '/assets/images/error_robot.png' | relative_url }}" />

    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>

    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ " /feed.xml" | prepend:
        site.baseurl | prepend: site.url }}" />

    <!-- Custom styles for this template -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/index.css?v={{ site.time | date: '%s' }}"
        media="screen" />

    <!-- CRITICAL: Inline Styles to Bypass Cache/Compile Issues -->
    <style>
        /* Full-Width Glass Banner */
        .glass-banner {
            width: 100% !important;
            background: rgba(10, 30, 30, 0.9) !important;
            /* Almost solid dark teal */
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4rem 0;
            margin: 4rem 0;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* UNIFIED CARD STYLE (White Box) */
        .portal-card,
        .glass.bg-white {
            background: #ffffff !important;
            color: #1a1a1a !important;
            border-radius: 12px;
            padding: 1.5rem;
            height: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(0, 0, 0, 0.1);
            display: block;
            /* Ensure it behaves like a block */
        }

        .portal-card:hover,
        .glass.bg-white:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2) !important;
        }

        .portal-card .title {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .portal-card .blurb {
            font-size: 0.95rem;
            color: #475569;
        }

        /* TITLE BOX (For Headers) */
        .title-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(4px);
        }

        .title-box h2 {
            margin: 0;
            color: #fff !important;
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Hero Title Box */
        .hero-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(4px);
            display: inline-block;
            margin-bottom: 2rem;
        }

        /* Ensure text in banner is readable */
        .glass-banner h1,
        .glass-banner h2,
        .glass-banner h3,
        .glass-banner li {
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        .glass-banner p {
            color: rgba(255, 255, 255, 0.9) !important;
        }

        .glass-banner .text-muted {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        /* CAROUSEL TEXT STYLING */
        .carousel-caption {
            color: #0f172a !important;
            /* Dark text */
            background: rgba(255, 255, 255, 0.85);
            /* Semi-transparent white backing */
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 1.5rem;
            bottom: 2rem;
            /* Lift it up slightly */
            left: 10%;
            right: 10%;
            width: 80%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-shadow: none !important;
            /* Remove any default text shadow */
        }

        .carousel-caption h5 {
            color: #0f172a !important;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .carousel-caption p {
            color: #334155 !important;
            font-weight: 500;
            margin-bottom: 0;
        }
    </style>

    <!-- Font Awesome icons -->
    <script src="https://use.fontawesome.com/c944ed3388.js"></script>

    <!-- Academicons https://jpswalsh.github.io/academicons/ -->
    <link rel="stylesheet" href="https://cdn.rawgit.com/jpswalsh/academicons/master/css/academicons.min.css">

    <!-- Github icons -->
    <link rel="stylesheet" href="{{ '/assets/octicons/octicons.css' | relative_url }}">

    <!-- Nunito font -->
    <link href="https://fonts.googleapis.com/css?family=Nunito" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

    <!-- Load KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.9.0/dist/katex.min.css"
        integrity="sha384-TEMocfGvRuD1rIAacqrknm5BQZ7W7uWitoih+jMNFXQIbNl16bO8OZmylH/Vi/Ei" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.9.0/dist/katex.min.js"
        integrity="sha384-jmxIlussZWB7qCuB+PgKG1uLjjxbVVIayPJwi6cG6Zb4YKq0JIw+OMnkkEC7kYCq"
        crossorigin="anonymous"></script>

    <!-- Analytics: GoatCounter -->
    <script data-goatcounter="https://tjlagrow.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

</head>
