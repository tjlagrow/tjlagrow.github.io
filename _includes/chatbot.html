<div id="chatbot-container">
    <div id="chatbot-window" style="display: none;">
        <div class="chatbot-header">
            <div class="d-flex align-items-center">
                <div style="width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite;"></div>
                <span>Waddles</span>
            </div>
            <div class="d-flex align-items-center" style="gap: 8px;">
                <select id="waddles-mode-selector" class="rounded py-0 px-1" style="font-size: 0.75rem; border: 1px solid rgba(0,0,0,0.15); outline: none; cursor: pointer; height: 22px; background: #1e293b; color: #2dd4bf; font-weight: 600;">
                    <option value="rag">🤖 WASM AI (RAG)</option>
                    <option value="keyword">🔍 VSM Keyword</option>
                </select>
                <button id="chatbot-close" aria-label="Close chat">×</button>
            </div>
        </div>
        <div class="chatbot-body" id="chatbot-body">
            <div class="chatbot-message system">
                <strong>Hello!</strong> I'm Waddles, TJ's virtual assistant. Ask me anything about TJ's teaching, research, or contact details, or select a topic below:
                <div class="chatbot-chips">
                    <button class="chatbot-chip" data-question="What courses does TJ teach?">🎓 OMSCS & Teaching</button>
                    <button class="chatbot-chip" data-question="Tell me about TJ's research.">🧠 Brain Research</button>
                    <button class="chatbot-chip" data-question="What certificates are in FlexStack?">🛠️ FlexStack Program</button>
                    <button class="chatbot-chip" data-question="How can I contact TJ?">✉️ Contact & Speaking</button>
                </div>
            </div>
        </div>
        <form id="chatbot-form" class="chatbot-input-area">
            <input type="text" id="chatbot-input" class="form-control form-control-sm" placeholder="Ask me a question..." aria-label="Chat input">
            <button type="submit" id="chatbot-send" class="btn btn-primary btn-sm" aria-label="Send message"><i class="fa fa-paper-plane"></i></button>
        </form>
    </div>

    <button id="chatbot-toggle" aria-label="Open chat" aria-expanded="false">
        <i class="fa fa-comments"></i>
    </button>
</div>

<style>
@keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
}
</style>

<script type="module">
    document.addEventListener('DOMContentLoaded', () => {
        const toggle = document.getElementById('chatbot-toggle');
        const windowEl = document.getElementById('chatbot-window');
        const close = document.getElementById('chatbot-close');
        const body = document.getElementById('chatbot-body');
        const form = document.getElementById('chatbot-form');
        const input = document.getElementById('chatbot-input');
        const modeSelector = document.getElementById('waddles-mode-selector');

        if (!toggle || !windowEl || !close || !body || !form || !input || !modeSelector) return;

        let embeddingsDatabase = [];
        let embedderLoaded = false;
        let generatorLoaded = false;
        let modelLoading = false;
        let embedder = null;
        let generator = null;

        // Asynchronously load vector embeddings database (very fast and lightweight)
        fetch('{{ "/assets/json/embeddings.json" | relative_url }}')
            .then(response => response.json())
            .then(data => {
                embeddingsDatabase = data;
            })
            .catch(err => console.error("Error loading Waddles embeddings database:", err));

        // Toggle visibility
        toggle.addEventListener('click', () => {
            const isHidden = windowEl.style.display === 'none';
            windowEl.style.display = isHidden ? 'flex' : 'none';
            toggle.setAttribute('aria-expanded', !isHidden);
            if (isHidden) {
                input.focus();
                scrollToBottom();
                if (modeSelector.value === 'rag') {
                    ensureModelLoaded();
                }
            }
        });

        // Navbar trigger integration
        const navTrigger = document.getElementById('navbar-chatbot-trigger');
        if (navTrigger) {
            navTrigger.addEventListener('click', (e) => {
                e.preventDefault();
                const isHidden = windowEl.style.display === 'none';
                if (isHidden) {
                    windowEl.style.display = 'flex';
                    toggle.setAttribute('aria-expanded', 'true');
                    input.focus();
                    scrollToBottom();
                    if (modeSelector.value === 'rag') {
                        ensureModelLoaded();
                    }
                } else {
                    windowEl.style.display = 'none';
                    toggle.setAttribute('aria-expanded', 'false');
                }
            });
        }

        close.addEventListener('click', () => {
            windowEl.style.display = 'none';
            toggle.setAttribute('aria-expanded', 'false');
        });

        // Event delegation for action chips
        body.addEventListener('click', (e) => {
            const chip = e.target.closest('.chatbot-chip');
            if (chip) {
                const question = chip.getAttribute('data-question');
                handleUserQuery(question);
            }
        });

        // Form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            handleUserQuery(text);
        });

        async function handleUserQuery(query) {
            // Append user message
            appendMessage(query, 'user');
            scrollToBottom();

            // Show typing indicator
            const indicator = showTypingIndicator();
            scrollToBottom();

            try {
                // Generate response
                const responseText = await getBotResponse(query);
                indicator.remove();
                appendMessage(responseText, 'system');
                scrollToBottom();
            } catch (err) {
                console.error("Error running query:", err);
                indicator.remove();
                appendMessage(`Sorry, I encountered an error while processing that.`, 'system');
                scrollToBottom();
            }
        }

        function appendMessage(content, sender) {
            const msg = document.createElement('div');
            msg.className = `chatbot-message ${sender}`;
            msg.innerHTML = content;
            body.appendChild(msg);
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'chatbot-message system';
            indicator.innerHTML = `
                <div class="typing-indicator-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            body.appendChild(indicator);
            return indicator;
        }

        function scrollToBottom() {
            body.scrollTop = body.scrollHeight;
        }

        // Lazy-load local models
        function ensureModelLoaded() {
            if ((embedderLoaded && generatorLoaded) || modelLoading) return;
            modelLoading = true;

            const loadingCard = document.createElement('div');
            loadingCard.className = 'chatbot-message system';
            loadingCard.id = 'waddles-loading-card';
            loadingCard.innerHTML = `
                <strong>Waddles is loading...</strong><br>
                Downloading lightweight models to run locally in your browser:<br>
                • Embedding Model (MiniLM, ~23MB)<br>
                • Generation Model (SmolLM, ~85MB)<br>
                This only downloads once and will be cached in your browser.<br>
                <div class="progress mt-2" style="height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;">
                    <div id="waddles-progress-bar" class="progress-bar" role="progressbar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #0d9488, #0ea5e9); transition: width 0.1s;"></div>
                </div>
                <div id="waddles-loading-percentage" class="small text-muted mt-1">Initializing download sequences...</div>
            `;
            body.appendChild(loadingCard);
            scrollToBottom();

            // Disable input while loading
            input.disabled = true;
            const submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            import('https://cdn.jsdelivr.net/npm/@huggingface/transformers')
                .then(async (m) => {
                    const { pipeline, env } = m;
                    env.allowLocalModels = false;
                    
                    // Disable multi-threading to run without SharedArrayBuffer (blocked by static hosts without COOP/COEP headers)
                    env.backends.onnx.wasm.numThreads = 1;

                    try {
                        const totalWeights = 108.0; // 23MB + 85MB
                        let embedderProgress = 0;
                        let generatorProgress = 0;

                        const updateProgressBar = () => {
                            const totalProgress = ((embedderProgress * 23.0) + (generatorProgress * 85.0)) / totalWeights;
                            const percent = Math.round(totalProgress);
                            const progressBar = document.getElementById('waddles-progress-bar');
                            const progressPercent = document.getElementById('waddles-loading-percentage');
                            if (progressBar) progressBar.style.width = `${percent}%`;
                            if (progressPercent) {
                                progressPercent.innerText = `Downloading local brain (${percent}%) - Embedder: ${Math.round(embedderProgress)}%, Generator: ${Math.round(generatorProgress)}%`;
                            }
                        };

                        // 1. Load the embedder
                        embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                            device: 'wasm',
                            progress_callback: (data) => {
                                if (data.status === 'progress') {
                                    embedderProgress = data.progress;
                                    updateProgressBar();
                                } else if (data.status === 'ready') {
                                    embedderProgress = 100;
                                    updateProgressBar();
                                }
                            }
                        });
                        embedderLoaded = true;

                        // 2. Load the generator
                        generator = await pipeline('text-generation', 'onnx-community/SmolLM-135M-Instruct', {
                            device: 'wasm',
                            progress_callback: (data) => {
                                if (data.status === 'progress') {
                                    generatorProgress = data.progress;
                                    updateProgressBar();
                                } else if (data.status === 'ready') {
                                    generatorProgress = 100;
                                    updateProgressBar();
                                }
                            }
                        });
                        generatorLoaded = true;

                        modelLoading = false;

                        const lc = document.getElementById('waddles-loading-card');
                        if (lc) lc.remove();

                        appendMessage(`<strong>Waddles is ready!</strong> My local WebAssembly neural networks are loaded. Ask me anything!`, 'system');
                        scrollToBottom();

                        input.disabled = false;
                        if (submitBtn) submitBtn.disabled = false;
                        input.focus();
                    } catch (err) {
                        console.error("ONNX initialization failed:", err);
                        fallbackToStatic(submitBtn, `Failed to load WebAssembly models. Falling back to keyword search mode...`);
                    }
                })
                .catch((err) => {
                    console.error("CDN fetch failed:", err);
                    fallbackToStatic(submitBtn, `Library import failed. Falling back to keyword search mode...`);
                });
        }

        function fallbackToStatic(submitBtn, msg) {
            embedderLoaded = false;
            generatorLoaded = false;
            modelLoading = false;
            const lc = document.getElementById('waddles-loading-card');
            if (lc) lc.remove();
            appendMessage(`<span class="text-warning">${msg}</span>`, 'system');
            scrollToBottom();
            input.disabled = false;
            if (submitBtn) submitBtn.disabled = false;
        }

        function findKeywordMatches(query) {
            if (!embeddingsDatabase || embeddingsDatabase.length === 0) return [];
            
            const queryTokens = query.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .split(/\s+/)
                .filter(t => t.length > 2);
                
            if (queryTokens.length === 0) return [];
            
            const stopWords = ['the', 'and', 'for', 'this', 'that', 'with', 'from', 'about', 'your', 'will', 'have', 'been', 'are', 'was', 'were', 'what', 'tell', 'how', 'who', 'does', 'shes', 'they'];
            const filteredQueryTokens = queryTokens.filter(t => !stopWords.includes(t));
            
            if (filteredQueryTokens.length === 0) return [];
            
            const results = embeddingsDatabase.map(item => {
                const titleText = item.title.toLowerCase();
                const contentText = item.text.toLowerCase();
                
                let score = 0;
                let matchCount = 0;
                
                filteredQueryTokens.forEach(token => {
                    if (titleText.includes(token)) {
                        score += 10;
                        matchCount++;
                    }
                    if (contentText.includes(token)) {
                        score += 3;
                        matchCount++;
                    }
                });
                
                const coverage = matchCount / filteredQueryTokens.length;
                score = score * coverage;
                
                return { doc: item, score };
            });
            
            return results
                .filter(r => r.score > 2.0)
                .sort((a, b) => b.score - a.score);
        }

        function getExcerpt(text, queryTerms, maxLength = 160) {
            let matchIdx = -1;
            
            for (let term of queryTerms) {
                const idx = text.toLowerCase().indexOf(term);
                if (idx !== -1) {
                    matchIdx = idx;
                    break;
                }
            }
            
            if (matchIdx === -1) {
                return text.length > maxLength ? text.substring(0, maxLength) + "..." : text;
            }
            
            let start = Math.max(0, matchIdx - 40);
            let end = Math.min(text.length, matchIdx + maxLength - 40);
            
            if (start > 0) {
                const firstSpace = text.indexOf(' ', start);
                if (firstSpace !== -1 && firstSpace < matchIdx) {
                    start = firstSpace + 1;
                }
            }
            if (end < text.length) {
                const lastSpace = text.lastIndexOf(' ', end);
                if (lastSpace !== -1 && lastSpace > matchIdx) {
                    end = lastSpace;
                }
            }
            
            let snippet = text.substring(start, end);
            if (start > 0) snippet = "..." + snippet;
            if (end < text.length) snippet = snippet + "...";
            
            return snippet;
        }

        async function getBotResponse(query) {
            const text = query.toLowerCase().trim();

            // 1. Curated greetings and specific shortcuts
            if (text.includes("hello") || text.includes("hi") || text.includes("hey") || text.includes("greetings") || text.includes("who are you") || text.includes("who is tj")) {
                return `<strong>Hello!</strong> I'm Waddles! I can help you find information on TJ's portfolio:<br>• <strong>CS 7641 / OMSCS Teaching</strong><br>• <strong>Neuroscience Research & fMRI</strong><br>• <strong>FlexStack Certificates</strong><br>• **Contact & Social links**<br><br>What would you like to explore?`;
            }
            if (text.includes("7641") || text.includes("7642") || text.includes("teach") || text.includes("course") || text.includes("class") || text.includes("omscs") || text.includes("student") || text.includes("learning")) {
                return `<strong>Teaching at Georgia Tech:</strong><br><br>TJ is the Lead Instructor for <strong>CS 7641: Machine Learning</strong> in Georgia Tech's OMSCS program, supporting 1,400+ graduate students and directing 30+ TAs. He also worked with <strong>CS 7642: Reinforcement Learning</strong>. He was awarded the <strong>2023 Outstanding Online TA of the Year</strong> at GT.<br><br>Read more details on the <a href="/teaching/" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">Teaching Page</a>.`;
            }
            if (text.includes("research") || text.includes("fmri") || text.includes("qpp") || text.includes("brain") || text.includes("cajal") || text.includes("neuro") || text.includes("paper") || text.includes("publication") || text.includes("science")) {
                return `<strong>Computational Neuroscience Research:</strong><br><br>TJ's research in the Keilholz MIND Lab focuses on <strong>spatiotemporal brain dynamics</strong> using resting-state fMRI. He studies <strong>Quasi-Periodic Patterns (QPPs)</strong> to find biomarkers for diseases like Alzheimer's and Parkinson's.<br><br>Check out his papers on the <a href="/research/" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">Research Page</a> or view his <a href="https://scholar.google.com/citations?user=KO7oYeAAAAAJ" target="_blank" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">Google Scholar</a>.`;
            }
            if (text.includes("flexstack") || text.includes("certificate") || text.includes("llm") || text.includes("agent") || text.includes("pandas") || text.includes("genai") || text.includes("generative")) {
                return `<strong>FlexStack Certificates:</strong><br><br>TJ is the Lead AI/LLM Expert for Georgia Tech's professional education **FlexStack** program, where he developed:<br>• <strong>Data Modeling & Visualization Certificate</strong> (Decision-Ready Data, pandas, sklearn).<br>• <strong>Python AI Principles Certificate</strong> (applied LLM API architectures, generative engineering, and agentic pipelines).`;
            }
            if (text.includes("email") || text.includes("contact") || text.includes("speak") || text.includes("hire") || text.includes("touch") || text.includes("linkedin") || text.includes("youtube")) {
                return `<strong>Contact & Socials:</strong><br><br>Connect with TJ via:<br>• <strong>Email:</strong> <code>tlagrow3 at gatech dot edu</code><br>• <strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/tjlagrow/" target="_blank" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">LinkedIn Profile</a><br>• <strong>GitHub:</strong> <a href="https://github.com/tjlagrow" target="_blank" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">GitHub Profile</a><br>• <strong>YouTube:</strong> <a href="https://www.youtube.com/@UnderstandingMachineLearning" target="_blank" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">UML Channel</a><br><br>Or send a message using the form on the <a href="/contact/" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">Contact Page</a>!`;
            }

        // Mode change listener
        modeSelector.addEventListener('change', () => {
            const mode = modeSelector.value;
            if (mode === 'rag') {
                appendMessage(`<strong>System:</strong> Initializing local neural models...`, 'system');
                ensureModelLoaded();
            } else {
                appendMessage(`<strong>System:</strong> Switched to legacy VSM Keyword matching mode.`, 'system');
            }
            scrollToBottom();
        });

            // 2. Mode-dependent search execution
            let matches = [];
            const searchMode = modeSelector.value;
            
            if (searchMode === 'rag' && embedderLoaded && embedder && embeddingsDatabase && embeddingsDatabase.length > 0) {
                try {
                    const output = await embedder(query, { pooling: 'mean', normalize: true });
                    const queryVector = Array.from(output.data);
                    
                    const scored = embeddingsDatabase.map(doc => {
                        let dotProduct = 0;
                        const docVec = doc.embedding;
                        for (let i = 0; i < queryVector.length; i++) {
                            dotProduct += queryVector[i] * docVec[i];
                        }
                        return { doc, score: dotProduct };
                    });
                    
                    matches = scored
                        .filter(r => r.score > 0.38)
                        .sort((a, b) => b.score - a.score);
                } catch (err) {
                    console.error("Vector search failed, falling back to keyword search:", err);
                    matches = findKeywordMatches(query);
                }
            } else {
                matches = findKeywordMatches(query);
            }

            if (matches.length > 0) {
                const bestMatch = matches[0].doc;
                const docTypeLabel = bestMatch.type.charAt(0).toUpperCase() + bestMatch.type.slice(1);

                if (searchMode === 'rag' && generatorLoaded && generator) {
                    let contextText = bestMatch.text;
                    // Grab second match too if it has high confidence
                    if (matches.length > 1 && matches[1].score > 0.42) {
                        contextText += "\n" + matches[1].doc.text;
                    }
                    
                    const prompt = `<|im_start|>system
You are Waddles, Theodore J. LaGrow (TJ)'s personal chatbot assistant.
Answer the user's question about TJ's research, teaching, or background using ONLY this context:
---
${contextText}
---
Keep your answer concise (1-3 sentences) and professional. Avoid stating "Based on the context" or "The text states". If the context doesn't contain the answer, politely tell them you couldn't find that detail on the website.
<|im_end|>
<|im_start|>user
${query}<|im_end|>
<|im_start|>assistant
`;
                    const output = await generator(prompt, {
                        max_new_tokens: 120,
                        temperature: 0.1,
                        do_sample: false,
                        return_full_text: false
                    });
                    
                    let responseText = output[0].generated_text.trim();
                    responseText = responseText.replace(/<\|im_end\|>/g, '').replace(/<\|im_start\|>/g, '').trim();
                    return `${responseText}<br><br><small style="opacity:0.75;">Source: ${docTypeLabel} - <a href="${bestMatch.url}" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">${bestMatch.title}</a></small>`;
                } else {
                    const queryTokens = query.toLowerCase().replace(/[^\w\s-]/g, '').split(/\s+/).filter(t => t.length > 2);
                    const stopWords = ['the', 'and', 'for', 'this', 'that', 'with', 'from', 'about', 'your', 'will', 'have', 'been', 'are', 'was', 'were', 'what', 'tell', 'how', 'who', 'does', 'shes', 'they'];
                    const searchTerms = queryTokens.filter(t => !stopWords.includes(t));
                    const excerpt = getExcerpt(bestMatch.text, searchTerms, 160);
                    return `<strong>[Keyword Mode] Found a match in ${docTypeLabel} "<a href="${bestMatch.url}" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">${bestMatch.title}</a>":</strong><br><br>
                    <em style="color:#94a3b8; font-size:0.95rem; display:block; padding-left:10px; border-left:2px solid #2dd4bf; margin-bottom:10px;">"${excerpt}"</em>
                    Click <a href="${bestMatch.url}" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">here to read more</a>.`;
                }
            }

            // 3. True Fallback with action chips
            return `I'm not sure about that, but I can help you with:<br>
                <div class="chatbot-chips">
                    <button class="chatbot-chip" data-question="What courses does TJ teach?">🎓 OMSCS & Teaching</button>
                    <button class="chatbot-chip" data-question="Tell me about TJ's research.">🧠 Brain Research</button>
                    <button class="chatbot-chip" data-question="What certificates are in FlexStack?">🛠️ FlexStack Program</button>
                    <button class="chatbot-chip" data-question="How can I contact TJ?">✉️ Contact Details</button>
                </div>`;
        }
    });
</script>
