<div id="chatbot-container">
    <div id="chatbot-window" style="display: none;">
        <div class="chatbot-header" style="flex-wrap: wrap; gap: 4px;">
            <div class="d-flex align-items-center">
                <div style="width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite;"></div>
                <span style="font-weight: 700;">Waddles</span>
            </div>
            <div class="d-flex align-items-center" style="gap: 4px; max-width: 85%;">
                <select id="waddles-model-selector" class="rounded py-0 px-1" style="font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.1); outline: none; cursor: pointer; height: 22px; background: #1e293b; color: #2dd4bf; font-weight: 600; max-width: 90px;" title="Model selection">
                    <option value="keyword" selected>🔍 Keyword</option>
                    <option value="smollm">🤖 SmolLM</option>
                    <option value="qwen">🤖 Qwen 0.5B</option>
                    <option value="smollm2">🤖 SmolLM2 360M</option>
                </select>
                <select id="waddles-personality-selector" class="rounded py-0 px-1" style="font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.1); outline: none; cursor: pointer; height: 22px; background: #1e293b; color: #f43f5e; font-weight: 600; max-width: 75px;" title="Personality mode">
                    <option value="helpful" selected>😇 Helpful</option>
                    <option value="sassy">🌶️ Sassy</option>
                    <option value="pirate">🏴‍☠️ Pirate</option>
                </select>
                <select id="waddles-quant-selector" class="rounded py-0 px-1" style="font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.1); outline: none; cursor: pointer; height: 22px; background: #1e293b; color: #38bdf8; font-weight: 600; max-width: 60px;" title="Quantization level" disabled>
                    <option value="q4" selected>4-bit</option>
                    <option value="q8">8-bit</option>
                    <option value="fp16">16-bit</option>
                </select>
                <button id="waddles-go-btn" class="rounded px-2" style="font-size: 0.65rem; border: none; cursor: pointer; height: 22px; background: #2dd4bf; color: #0f172a; font-weight: 700; transition: opacity 0.2s;">Go</button>
                <button id="chatbot-close" aria-label="Close chat">×</button>
            </div>
        </div>
        
        <!-- Category pre-filters bar -->
        <div id="waddles-filter-bar" style="display: flex; gap: 8px; padding: 6px 12px; background: rgba(0,0,0,0.25); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.725rem; color: #cbd5e1; align-items: center;">
            <span style="opacity: 0.75; font-weight: 600;">Filters:</span>
            <label style="display: flex; align-items: center; gap: 3px; cursor: pointer; margin: 0;"><input type="checkbox" id="filter-research" checked> Research</label>
            <label style="display: flex; align-items: center; gap: 3px; cursor: pointer; margin: 0;"><input type="checkbox" id="filter-teaching" checked> Teaching</label>
            <label style="display: flex; align-items: center; gap: 3px; cursor: pointer; margin: 0;"><input type="checkbox" id="filter-bio" checked> Bio</label>
        </div>

        <div class="chatbot-body" id="chatbot-body">
            <div class="chatbot-message system">
                <strong>Hello!</strong> I'm Waddles, TJ's virtual assistant. Ask me anything about TJ's teaching, research, or contact details, or select a topic below.
                <br><br>
                <em>I am currently running in Keyword Match mode by default. Select a neural model in the header and click Go to load WebAssembly RAG!</em>
                <div class="chatbot-chips">
                    <button class="chatbot-chip" data-question="What courses does TJ teach?">🎓 OMSCS & Teaching</button>
                    <button class="chatbot-chip" data-question="Tell me about TJ's research.">🧠 Brain Research</button>
                    <button class="chatbot-chip" data-question="What certificates are in FlexStack?">🛠️ FlexStack Program</button>
                    <button class="chatbot-chip" data-question="How can I contact TJ?">✉️ Contact & Speaking</button>
                </div>
            </div>
        </div>
        <form id="chatbot-form" class="chatbot-input-area">
            <input type="text" id="chatbot-input" class="form-control form-control-sm" placeholder="Ask me a question..." aria-label="Chat input">
            <button type="submit" id="chatbot-send" class="btn btn-primary btn-sm" aria-label="Send message"><i class="fa fa-paper-plane"></i></button>
        </form>
    </div>

    <button id="chatbot-toggle" aria-label="Open chat" aria-expanded="false">
        <i class="fa fa-comments"></i>
    </button>
</div>

<style>
@keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
}
</style>

<script type="module">
    document.addEventListener('DOMContentLoaded', () => {
        const toggle = document.getElementById('chatbot-toggle');
        const windowEl = document.getElementById('chatbot-window');
        const close = document.getElementById('chatbot-close');
        const body = document.getElementById('chatbot-body');
        const form = document.getElementById('chatbot-form');
        const input = document.getElementById('chatbot-input');
        
        const modelSelector = document.getElementById('waddles-model-selector');
        const personalitySelector = document.getElementById('waddles-personality-selector');
        const quantSelector = document.getElementById('waddles-quant-selector');
        const goBtn = document.getElementById('waddles-go-btn');

        if (!toggle || !windowEl || !close || !body || !form || !input || !modelSelector || !personalitySelector || !quantSelector || !goBtn) return;

        let embeddingsDatabase = [];
        let modelLoading = false;
        let chatHistory = [];
        
        let loadedEmbedders = {};
        let loadedGenerators = {};
        
        let activeEmbedder = null;
        let activeGenerator = null;
        
        let activeModelType = 'keyword'; // Default startup mode is lightweight keyword matching
        let activeModelKey = 'keyword';
        let activeQuantKey = 'q4';

        const modelRepoMap = {
            'smollm': 'onnx-community/SmolLM-135M-Instruct-ONNX',
            'qwen': 'onnx-community/Qwen2.5-0.5B-Instruct',
            'smollm2': 'onnx-community/SmolLM2-360M-Instruct-ONNX'
        };

        // Disable quantization selector when keyword search is selected
        modelSelector.addEventListener('change', () => {
            quantSelector.disabled = (modelSelector.value === 'keyword');
        });

        // Trigger loading and switching only when clicking the Go button
        goBtn.addEventListener('click', () => {
            const selectedModel = modelSelector.value;
            const selectedQuant = quantSelector.value;
            chatHistory = []; // Reset conversation history on model change
            
            if (selectedModel === 'keyword') {
                activeModelType = 'keyword';
                activeModelKey = 'keyword';
                activeQuantKey = 'q4';
                appendMessage(`<strong>[System]</strong> Switched to legacy VSM Keyword matching mode.`, 'system');
                scrollToBottom();
            } else {
                ensureModelLoaded(selectedModel, selectedQuant);
            }
        });

        // Asynchronously load vector embeddings database
        fetch('{{ "/assets/json/embeddings.json" | relative_url }}')
            .then(response => response.json())
            .then(data => {
                embeddingsDatabase = data;
            })
            .catch(err => console.error("Error loading Waddles embeddings database:", err));

        // Toggle visibility
        toggle.addEventListener('click', () => {
            const isHidden = windowEl.style.display === 'none';
            windowEl.style.display = isHidden ? 'flex' : 'none';
            toggle.setAttribute('aria-expanded', !isHidden);
            if (isHidden) {
                input.focus();
                scrollToBottom();
            }
        });

        // Navbar trigger integration
        const navTrigger = document.getElementById('navbar-chatbot-trigger');
        if (navTrigger) {
            navTrigger.addEventListener('click', (e) => {
                e.preventDefault();
                const isHidden = windowEl.style.display === 'none';
                if (isHidden) {
                    windowEl.style.display = 'flex';
                    toggle.setAttribute('aria-expanded', 'true');
                    input.focus();
                    scrollToBottom();
                } else {
                    windowEl.style.display = 'none';
                    toggle.setAttribute('aria-expanded', 'false');
                }
            });
        }

        close.addEventListener('click', () => {
            windowEl.style.display = 'none';
            toggle.setAttribute('aria-expanded', 'false');
        });

        // Event delegation for action chips and dynamically rendered follow-up chips
        body.addEventListener('click', (e) => {
            const chip = e.target.closest('.chatbot-chip');
            if (chip) {
                const question = chip.getAttribute('data-question');
                handleUserQuery(question);
            }
        });

        // Form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            handleUserQuery(text);
        });

        // Category pre-filtering validation helper
        function passFilters(doc) {
            const researchChecked = document.getElementById('filter-research').checked;
            const teachingChecked = document.getElementById('filter-teaching').checked;
            const bioChecked = document.getElementById('filter-bio').checked;

            if (doc.type === 'publication' || doc.type === 'talk') {
                return researchChecked;
            }
            if (doc.url.includes('/teaching') || doc.type === 'milestone') {
                return teachingChecked;
            }
            return bioChecked;
        }

        async function handleUserQuery(query) {
            appendMessage(query, 'user');
            scrollToBottom();

            const indicator = showTypingIndicator();
            scrollToBottom();

            const startTime = performance.now();

            try {
                const searchMode = activeModelType;
                const modelName = getModelName();
                
                // Retrieve response and structured data
                const result = await getBotResponse(query);
                indicator.remove();
                
                const endTime = performance.now();
                const latencyMs = Math.round(endTime - startTime);
                
                const queryId = 'q_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
                
                const responseText = result.answer;
                
                const extraData = {
                    answer: result.answer,
                    confidence: result.confidence,
                    category: result.category,
                    followups: result.followups,
                    latency: latencyMs,
                    sourceTitle: result.sourceTitle,
                    sourceUrl: result.sourceUrl
                };

                appendMessage(responseText, 'system', query, queryId, extraData);
                scrollToBottom();
                
                // Keep history for conversation context memory
                chatHistory.push({ role: 'user', content: query });
                chatHistory.push({ role: 'assistant', content: responseText });
                if (chatHistory.length > 10) {
                    chatHistory.splice(0, 2);
                }
                
                logQuery(queryId, query, responseText, extraData);
            } catch (err) {
                console.error("Error running query:", err);
                indicator.remove();
                appendMessage(`Sorry, I encountered an error while processing that.`, 'system');
                scrollToBottom();
            }
        }

        const QUERY_LOG_ENDPOINT = 'https://docs.google.com/forms/d/e/1FAIpQLSeA8wV_q15VxHdziMDbcnG1_BtUMc78qe1USSHpNJaLGuEctQ/formResponse';
        const RATING_LOG_ENDPOINT = 'https://docs.google.com/forms/d/e/1FAIpQLSdFARyBwkgNofCuHka215xevLVdFqJAtmrk-JznJn0y_WbuMg/formResponse';

        function getModelName() {
            if (activeModelType === 'rag') {
                return `${modelRepoMap[activeModelKey]} (${activeQuantKey})`;
            }
            return 'VSM Keyword Search';
        }

        function logQuery(queryId, queryText, responseText, extraData) {
            const searchMode = activeModelType;
            const modelName = getModelName();
            const logItem = {
                timestamp: new Date().toISOString(),
                queryId: queryId,
                query: queryText,
                response: responseText.replace(/<[^>]+>/g, '').trim(),
                mode: searchMode,
                model: modelName,
                confidence: extraData ? extraData.confidence : 1.0,
                category: extraData ? extraData.category : 'Unknown',
                followups: extraData ? JSON.stringify(extraData.followups) : '[]',
                latency: extraData ? extraData.latency : 0
            };

            console.log("[Waddles] Logging query transaction", logItem);

            let queries = [];
            try {
                queries = JSON.parse(localStorage.getItem('waddles_queries')) || [];
            } catch (e) {}
            queries.push(logItem);
            localStorage.setItem('waddles_queries', JSON.stringify(queries));

            if (QUERY_LOG_ENDPOINT) {
                const formData = new URLSearchParams();
                formData.append('entry.1296087798', logItem.queryId);
                formData.append('entry.2055350119', logItem.query);
                formData.append('entry.63873566', logItem.response);
                formData.append('entry.1234317761', logItem.mode);
                formData.append('entry.1855776282', logItem.model);
                formData.append('entry.482463694', String(logItem.confidence));
                formData.append('entry.100723105', logItem.category);
                formData.append('entry.1013328782', logItem.followups);
                formData.append('entry.866148227', String(logItem.latency));

                // Format conversation history for Google Forms log (exclude the current turn just added)
                const historyToLog = chatHistory.slice(0, -2);
                const historyText = historyToLog.map(m => `${m.role === 'user' ? 'User' : 'Waddles'}: ${m.content}`).join('\n');
                formData.append('entry.1452883440', historyText);

                fetch(QUERY_LOG_ENDPOINT, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors'
                })
                .catch(err => console.warn("[Waddles] Query log webhook failed", err));
            }
        }

        function logRating(queryId, queryText, responseText, ratingVal, extraData) {
            const searchMode = activeModelType;
            const modelName = getModelName();
            const ratingItem = {
                timestamp: new Date().toISOString(),
                queryId: queryId,
                query: queryText,
                response: responseText.replace(/<[^>]+>/g, '').trim(),
                rating: ratingVal,
                mode: searchMode,
                model: modelName,
                confidence: extraData ? extraData.confidence : 1.0,
                category: extraData ? extraData.category : 'Unknown',
                followups: extraData ? JSON.stringify(extraData.followups) : '[]',
                latency: extraData ? extraData.latency : 0
            };

            console.log("[Waddles] Logging satisfaction rating feedback", ratingItem);

            let ratings = [];
            try {
                ratings = JSON.parse(localStorage.getItem('waddles_ratings')) || [];
            } catch (e) {}
            ratings.push(ratingItem);
            localStorage.setItem('waddles_ratings', JSON.stringify(ratings));

            if (RATING_LOG_ENDPOINT) {
                const formData = new URLSearchParams();
                formData.append('entry.695653066', ratingItem.queryId);
                formData.append('entry.1506952534', ratingItem.query);
                formData.append('entry.1399217492', ratingItem.response);
                formData.append('entry.976982427', ratingItem.rating);
                formData.append('entry.674977670', ratingItem.mode);
                formData.append('entry.1086852964', ratingItem.model);
                formData.append('entry.1430232593', String(ratingItem.confidence));
                formData.append('entry.347471578', ratingItem.category);
                formData.append('entry.463651261', ratingItem.followups);
                formData.append('entry.531411174', String(ratingItem.latency));

                // Format conversation history for Google Forms log (exclude the current turn just added)
                const historyToLog = chatHistory.slice(0, -2);
                const historyText = historyToLog.map(m => `${m.role === 'user' ? 'User' : 'Waddles'}: ${m.content}`).join('\n');
                formData.append('entry.937115658', historyText);

                fetch(RATING_LOG_ENDPOINT, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors'
                })
                .catch(err => console.warn("[Waddles] Rating log webhook failed", err));
            }
        }

        function appendMessage(content, sender, queryText = null, queryId = null, extraData = null) {
            const msg = document.createElement('div');
            msg.className = `chatbot-message ${sender}`;

            let displayHtml = content;
            let citationHtml = '';

            // Handle metadata decoration
            if (extraData && sender === 'system' && extraData.category) {
                displayHtml = extraData.answer;
                
                const confidencePercent = Math.round(extraData.confidence * 100);
                let confidenceStyle = 'opacity: 0.65;';
                let confidenceWarning = `[Confidence: ${confidencePercent}%]`;
                if (extraData.confidence < 0.5) {
                    confidenceStyle = 'color: #f59e0b; font-weight: 700;';
                    confidenceWarning = `⚠️ Low confidence (${confidencePercent}%)`;
                }

                let sourceLinkHtml = '';
                if (extraData.sourceTitle && extraData.sourceUrl) {
                    sourceLinkHtml = ` - Source: <a href="${extraData.sourceUrl}" style="color:#2dd4bf; text-decoration:underline; font-weight:600;">${extraData.sourceTitle}</a>`;
                }

                citationHtml = `<div style="font-size: 0.725rem; margin-top: 8px; border-top: 1px dashed rgba(255,255,255,0.08); padding-top: 4px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; width: 100%;">
                    <span>🏷️ ${extraData.category} <span style="${confidenceStyle}">${confidenceWarning}</span></span>
                    <span>${sourceLinkHtml}</span>
                </div>`;
            }

            msg.innerHTML = displayHtml;
            if (citationHtml) {
                msg.innerHTML += citationHtml;
            }

            // Render dynamic action chips if present in JSON output
            if (extraData && extraData.followups && extraData.followups.length > 0) {
                const chipsContainer = document.createElement('div');
                chipsContainer.className = 'chatbot-chips';
                chipsContainer.style.marginTop = '8px';
                
                extraData.followups.forEach(q => {
                    const chipBtn = document.createElement('button');
                    chipBtn.className = 'chatbot-chip';
                    chipBtn.setAttribute('data-question', q);
                    chipBtn.innerText = q;
                    chipsContainer.appendChild(chipBtn);
                });
                msg.appendChild(chipsContainer);
            }

            if (sender === 'system' && queryText && queryId && !content.includes("Waddles is ready") && !content.includes("Switched to") && !content.includes("Initializing local")) {
                const fbContainer = document.createElement('div');
                fbContainer.className = 'chatbot-feedback-buttons';
                fbContainer.innerHTML = `
                    <button class="chatbot-feedback-btn" data-rating="up" title="Thumb up">👍</button>
                    <button class="chatbot-feedback-btn" data-rating="down" title="Thumb down">👎</button>
                `;
                msg.appendChild(fbContainer);

                const btnUp = fbContainer.querySelector('[data-rating="up"]');
                const btnDown = fbContainer.querySelector('[data-rating="down"]');

                const handleFeedback = (ratingVal) => {
                    btnUp.classList.add('disabled');
                    btnDown.classList.add('disabled');
                    if (ratingVal === 'up') {
                        btnUp.classList.add('selected');
                        btnUp.classList.remove('disabled');
                    } else {
                        btnDown.classList.add('selected');
                        btnDown.classList.remove('disabled');
                    }
                    logRating(queryId, queryText, displayHtml, ratingVal, extraData);
                };

                btnUp.addEventListener('click', () => handleFeedback('up'));
                btnDown.addEventListener('click', () => handleFeedback('down'));
            }

            body.appendChild(msg);
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'chatbot-message system';
            indicator.innerHTML = `
                <div class="typing-indicator-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            body.appendChild(indicator);
            return indicator;
        }

        function scrollToBottom() {
            body.scrollTop = body.scrollHeight;
        }

        // Lazy-load dynamic models on click confirmation
        async function ensureModelLoaded(modelKey, quantKey) {
            const modelRepo = modelRepoMap[modelKey];
            const cacheKey = `${modelKey}_${quantKey}`;

            if (loadedGenerators[cacheKey] && loadedEmbedders['all-MiniLM-L6-v2']) {
                activeEmbedder = loadedEmbedders['all-MiniLM-L6-v2'];
                activeGenerator = loadedGenerators[cacheKey];
                activeModelType = 'rag';
                activeModelKey = modelKey;
                activeQuantKey = quantKey;
                appendMessage(`<strong>[System]</strong> Switched to neural model ${modelKey.toUpperCase()} (${quantKey}) from cache.`, 'system');
                scrollToBottom();
                return;
            }

            modelLoading = true;
            input.disabled = true;
            const submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            const loadingCard = document.createElement('div');
            loadingCard.className = 'chatbot-message system';
            loadingCard.id = 'waddles-loading-card';
            loadingCard.innerHTML = `
                <strong>Waddles is loading ${modelKey.toUpperCase()} (${quantKey})...</strong><br>
                Downloading lightweight brain files to run inside your browser. Larger models may take a moment to initialize.<br>
                <div class="progress mt-2" style="height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;">
                    <div id="waddles-progress-bar" class="progress-bar" role="progressbar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #0d9488, #0ea5e9); transition: width 0.1s;"></div>
                </div>
                <div id="waddles-loading-percentage" class="small text-muted mt-1">Initializing loading sequences...</div>
            `;
            body.appendChild(loadingCard);
            scrollToBottom();

            import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3')
                .then(async (m) => {
                    const { pipeline, env } = m;
                    env.allowLocalModels = false;
                    env.backends.onnx.wasm.numThreads = 1;
                    env.backends.onnx.wasm.proxy = false;
                    env.backends.onnx.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/';

                    console.log("[Waddles] Module loaded. Configuring parameters.");

                    try {
                        let embedderProgress = 0;
                        let generatorProgress = 0;

                        const updateProgressBar = () => {
                            const percent = Math.round((embedderProgress + generatorProgress) / 2);
                            const progressBar = document.getElementById('waddles-progress-bar');
                            const progressPercent = document.getElementById('waddles-loading-percentage');
                            if (progressBar) progressBar.style.width = `${percent}%`;
                            if (progressPercent) {
                                progressPercent.innerText = `Downloading local intelligence (${percent}%)`;
                            }
                        };

                        // 1. Fetch Embedder
                        if (!loadedEmbedders['all-MiniLM-L6-v2']) {
                            activeEmbedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                                device: 'wasm',
                                progress_callback: (data) => {
                                    if (data.status === 'progress') {
                                        embedderProgress = data.progress;
                                        updateProgressBar();
                                    } else if (data.status === 'ready') {
                                        embedderProgress = 100;
                                        updateProgressBar();
                                    }
                                }
                            });
                            loadedEmbedders['all-MiniLM-L6-v2'] = activeEmbedder;
                        } else {
                            activeEmbedder = loadedEmbedders['all-MiniLM-L6-v2'];
                            embedderProgress = 100;
                            updateProgressBar();
                        }

                        // 2. Fetch Generator
                        activeGenerator = await pipeline('text-generation', modelRepo, {
                            device: 'wasm',
                            dtype: quantKey,
                            progress_callback: (data) => {
                                if (data.status === 'progress') {
                                    generatorProgress = data.progress;
                                    updateProgressBar();
                                } else if (data.status === 'ready') {
                                    generatorProgress = 100;
                                    updateProgressBar();
                                }
                            }
                        });
                        loadedGenerators[cacheKey] = activeGenerator;

                        activeModelType = 'rag';
                        activeModelKey = modelKey;
                        activeQuantKey = quantKey;
                        modelLoading = false;

                        const lc = document.getElementById('waddles-loading-card');
                        if (lc) lc.remove();

                        appendMessage(`<strong>Waddles is ready!</strong> Loaded neural brain model ${modelKey.toUpperCase()} (${quantKey}) successfully.`, 'system');
                        scrollToBottom();

                        input.disabled = false;
                        if (submitBtn) submitBtn.disabled = false;
                        input.focus();
                    } catch (err) {
                        console.error("ONNX initialization failed:", err);
                        fallbackToStatic(submitBtn, `Failed to load WebAssembly model. Error: ${err.message || err}. Falling back to keyword search mode...`);
                    }
                })
                .catch((err) => {
                    console.error("CDN fetch failed:", err);
                    fallbackToStatic(submitBtn, `Library import failed. Error: ${err.message || err}. Falling back to keyword search mode...`);
                });
        }

        function fallbackToStatic(submitBtn, msg) {
            activeModelType = 'keyword';
            activeModelKey = 'keyword';
            modelLoading = false;
            const lc = document.getElementById('waddles-loading-card');
            if (lc) lc.remove();
            appendMessage(`<span class="text-warning">${msg}</span>`, 'system');
            scrollToBottom();
            input.disabled = false;
            if (submitBtn) submitBtn.disabled = false;
        }

        function findKeywordMatches(query) {
            if (!embeddingsDatabase || embeddingsDatabase.length === 0) return [];
            
            const queryTokens = query.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .split(/\s+/)
                .filter(t => t.length > 2);
                
            if (queryTokens.length === 0) return [];
            
            const stopWords = ['the', 'and', 'for', 'this', 'that', 'with', 'from', 'about', 'your', 'will', 'have', 'been', 'are', 'was', 'were', 'what', 'tell', 'how', 'who', 'does', 'shes', 'they'];
            const filteredQueryTokens = queryTokens.filter(t => !stopWords.includes(t));
            
            if (filteredQueryTokens.length === 0) return [];
            
            const results = embeddingsDatabase.map(item => {
                const titleText = item.title.toLowerCase();
                const contentText = item.text.toLowerCase();
                
                let score = 0;
                let matchCount = 0;
                
                filteredQueryTokens.forEach(token => {
                    if (titleText.includes(token)) {
                        score += 10;
                        matchCount++;
                    }
                    if (contentText.includes(token)) {
                        score += 3;
                        matchCount++;
                    }
                });
                
                const coverage = matchCount / filteredQueryTokens.length;
                score = score * coverage;
                
                return { doc: item, score };
            });
            
            return results
                .filter(r => r.score > 2.0)
                .sort((a, b) => b.score - a.score);
        }

        function getExcerpt(text, queryTerms, maxLength = 160) {
            let matchIdx = -1;
            
            for (let term of queryTerms) {
                const idx = text.toLowerCase().indexOf(term);
                if (idx !== -1) {
                    matchIdx = idx;
                    break;
                }
            }
            
            if (matchIdx === -1) {
                return text.length > maxLength ? text.substring(0, maxLength) + "..." : text;
            }
            
            let start = Math.max(0, matchIdx - 40);
            let end = Math.min(text.length, matchIdx + maxLength - 40);
            
            if (start > 0) {
                const firstSpace = text.indexOf(' ', start);
                if (firstSpace !== -1 && firstSpace < matchIdx) {
                    start = firstSpace + 1;
                }
            }
            if (end < text.length) {
                const lastSpace = text.lastIndexOf(' ', end);
                if (lastSpace !== -1 && lastSpace > matchIdx) {
                    end = lastSpace;
                }
            }
            
            let snippet = text.substring(start, end);
            if (start > 0) snippet = "..." + snippet;
            if (end < text.length) snippet = snippet + "...";
            
            return snippet;
        }

        const typeIcons = {
            'page': '📄 Site Page',
            'post': '📝 Blog Post',
            'newsletter': '✉️ Newsletter',
            'publication': '🎓 Publication',
            'talk': '🗣️ Presentation',
            'milestone': '🏆 Defense Milestone'
        };

        function highlightText(text, queryTerms) {
            if (!queryTerms || queryTerms.length === 0) return text;
            
            const escapedTerms = queryTerms
                .map(term => term.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'))
                .filter(term => term.length > 0);
                
            if (escapedTerms.length === 0) return text;
            
            const regex = new RegExp(`(${escapedTerms.join('|')})`, 'gi');
            return text.replace(regex, `<span style="color: #2dd4bf; font-weight: 700; border-bottom: 1.5px dashed rgba(45, 212, 191, 0.45);">$1</span>`);
        }

        // Parsing mechanism with text fallback
        function parseStructuredResponse(rawOutput, bestMatch) {
            let cleaned = rawOutput.trim();
            if (cleaned.startsWith('```')) {
                cleaned = cleaned.replace(/^```(?:json)?\n?|```$/g, '').trim();
            }

            try {
                const parsedObj = JSON.parse(cleaned);
                if (parsedObj.answer) {
                    return {
                        answer: parsedObj.answer,
                        confidence: parsedObj.confidence ?? 0.75,
                        category: parsedObj.category ?? 'Bio/Contact',
                        followups: Array.isArray(parsedObj.followups) ? parsedObj.followups.slice(0, 2) : [],
                        sourceTitle: bestMatch ? bestMatch.title : null,
                        sourceUrl: bestMatch ? bestMatch.url : null
                    };
                }
            } catch (err) {
                console.warn("[Waddles] Response parsing fallback engaged:", err, cleaned);
            }

            // Plain text parsing fallback
            return {
                answer: rawOutput,
                confidence: 0.6,
                category: 'Unknown',
                followups: [],
                sourceTitle: bestMatch ? bestMatch.title : null,
                sourceUrl: bestMatch ? bestMatch.url : null
            };
        }

        async function getBotResponse(query) {
            const text = query.toLowerCase().trim();

            const personality = document.getElementById('waddles-personality-selector')?.value || 'helpful';

            // 1. Curated responses for exact match chips / simple greetings (only when helpful personality is active)
            const greetings = ["hello", "hi", "hey", "greetings", "who are you", "who is tj"];

            if (isGreeting && personality === 'helpful') {
                return {

                    confidence: 1.0,
                    category: "Bio/Contact",
                    followups: ["What courses does TJ teach?", "Tell me about TJ's research."]
                };
            }

            if (personality === 'helpful' && (text === "what courses does tj teach?" || text === "tell me about cs 7641" || text === "tell me about cs 7642" || text === "omscs")) {
                return {
                    answer: "<strong>Teaching at Georgia Tech</strong><br><br>TJ is the Lead Instructor for CS 7641 (Machine Learning) in Georgia Tech's OMSCS program, supporting 1400+ graduate students and directing 30+ TAs. He also worked with CS 7642 (Reinforcement Learning). In 2023, he was awarded the Outstanding Online TA of the Year at GT.<br><br>Find more details on the <a href=\"/teaching/\" style=\"color:#2dd4bf; text-decoration:underline; font-weight:600;\">Teaching Page</a>.",
                    confidence: 1.0,
                    category: "Teaching",
                    followups: ["What certificates are in FlexStack?", "How can I contact TJ?"]
                };
            }

            if (personality === 'helpful' && (text === "tell me about tj's research." || text === "research" || text === "brain research")) {
                return {
                    answer: "<strong>Neuroscience Research</strong><br><br>TJ's research in the Keilholz MIND Lab focuses on brain dynamics using resting-state fMRI. He studies Quasi-Periodic Patterns (QPPs) to identify biomarkers for diseases such as Alzheimer's and Parkinson's.<br><br>Check out his papers on the <a href=\"/research/\" style=\"color:#2dd4bf; text-decoration:underline; font-weight:600;\">Research Page</a> or view his <a href=\"https://scholar.google.com/citations?user=KO7oYeAAAAAJ\" target=\"_blank\" style=\"color:#2dd4bf; text-decoration:underline; font-weight:600;\">Google Scholar Profile</a>.",
                    confidence: 1.0,
                    category: "Research",
                    followups: ["Tell me about TJ's research.", "What courses does TJ teach?"]
                };
            }

            if (personality === 'helpful' && (text === "what certificates are in flexstack?" || text === "flexstack" || text === "flexstack program")) {
                return {
                    answer: "<strong>FlexStack Certificates</strong><br><br>TJ is the Lead AI/LLM Expert for Georgia Tech's professional education FlexStack program. He developed the Data Modeling and Visualization Certificate and the Python AI Principles Certificate.",
                    confidence: 1.0,
                    category: "Teaching",
                    followups: ["What courses does TJ teach?", "How can I contact TJ?"]
                };
            }

            if (personality === 'helpful' && (text === "how can i contact tj?" || text === "contact" || text === "email")) {
                return {
                    answer: "<strong>Contact and Social Links</strong><br><br>You can connect with TJ via email at tlagrow3 at gatech dot edu. You can also visit his LinkedIn, GitHub, and YouTube profiles, or send a message using the form on the <a href=\"/contact/\" style=\"color:#2dd4bf; text-decoration:underline; font-weight:600;\">Contact Page</a>.",
                    confidence: 1.0,
                    category: "Bio/Contact",
                    followups: ["How can I contact TJ?", "What courses does TJ teach?"]
                };
            }

            // 2. Dynamic hybrid retrieval matching
            let matches = [];
            const keywordMatches = findKeywordMatches(query);

            if (activeModelType === 'rag' && activeEmbedder && activeGenerator && embeddingsDatabase && embeddingsDatabase.length > 0) {
                try {
                    const output = await activeEmbedder(query, { pooling: 'mean', normalize: true });
                    const queryVector = Array.from(output.data);

                    const scored = embeddingsDatabase
                        .filter(passFilters)
                        .map(doc => {
                            let dotProduct = 0;
                            const docVec = doc.embedding;
                            for (let i = 0; i < queryVector.length; i++) {
                                dotProduct += queryVector[i] * docVec[i];
                            }

                            // Semantic boosting for keyword matches
                            const kwMatch = keywordMatches.find(k => k.doc.url === doc.url);
                            let score = dotProduct;
                            if (kwMatch) {
                                score += 0.08;
                            }

                            return { doc, score };
                        });

                    matches = scored
                        .filter(r => r.score > 0.38)
                        .sort((a, b) => b.score - a.score);
                } catch (err) {
                    console.error("Vector search failed, falling back to keyword search:", err);
                    matches = keywordMatches.filter(r => passFilters(r.doc));
                }
            } else {
                matches = keywordMatches.filter(r => passFilters(r.doc));
            }

            if (matches.length > 0) {
                const bestMatch = matches[0].doc;
                const docTypeLabel = bestMatch.type.charAt(0).toUpperCase() + bestMatch.type.slice(1);

                if (activeModelType === 'rag' && activeGenerator) {
                    let contextText = bestMatch.text;
                    if (matches.length > 1 && matches[1].score > 0.42) {
                        contextText += "\n" + matches[1].doc.text;
                    }

                    // Format chat history context
                    let historyPrompt = "";
                    const historyToInclude = chatHistory.filter(h => h.content !== query);
                    historyToInclude.slice(-4).forEach(msg => {
                        historyPrompt += `<|im_start|>${msg.role}\n${msg.content}<|im_end|>\n`;
                    });

                    // Define personality-specific instructions
                    let systemInstruction = "";
                    if (personality === 'sassy') {
                        systemInstruction = `You are Waddles, Theodore J. LaGrow (TJ)'s sassy, sarcastic personal chatbot assistant.
Answer the user's question about TJ's research, teaching, or background using ONLY this context.
Be witty, slightly sarcastic, and funny, but still answer the question factually based on the context. Do not make up facts outside the context.
Context:
---
${contextText}
---`;
                    } else if (personality === 'pirate') {
                        systemInstruction = `You are Waddles, Theodore J. LaGrow (TJ)'s pirate chatbot assistant.
Answer the user's question about TJ's research, teaching, or background using ONLY this context.
You MUST speak like a pirate (use words like Ahoy, Matey, Ye, Harrr, etc.).
Context:
---
${contextText}
---`;
                    } else {
                        systemInstruction = `You are Waddles, Theodore J. LaGrow (TJ)'s personal chatbot assistant.
Answer the user's question about TJ's research, teaching, or background using ONLY this context:
---
${contextText}
---`;
                    }

                    const prompt = `<|im_start|>system
${systemInstruction}
You MUST respond with a single valid JSON object. Do not output any markdown formatting, backticks, or introduction text. Follow this schema:
{
  "answer": "Concise answer of 1-3 sentences.",
  "confidence": 0.0 to 1.0 (estimation of how well the context answers the query),
  "category": "One of [Research, Teaching, Bio/Contact, Unknown]",
  "followups": ["Short follow-up question 1", "Short follow-up question 2"]
}
<|im_end|>
${historyPrompt}<|im_start|>user
${query}<|im_end|>
<|im_start|>assistant
`;
                    const output = await activeGenerator(prompt, {
                        max_new_tokens: 180,
                        temperature: 0.1,
                        do_sample: false,
                        return_full_text: false
                    });

                    let generatedText = output[0].generated_text.trim();
                    generatedText = generatedText.replace(/<\|im_end\|>/g, '').replace(/<\|im_start\|>/g, '').trim();
                    
                    return parseStructuredResponse(generatedText, bestMatch);
                } else {
                    const queryTokens = query.toLowerCase().replace(/[^\w\s-]/g, '').split(/\s+/).filter(t => t.length > 2);
                    const stopWords = ['the', 'and', 'for', 'this', 'that', 'with', 'from', 'about', 'your', 'will', 'have', 'been', 'are', 'was', 'were', 'what', 'tell', 'how', 'who', 'does', 'shes', 'they'];
                    const searchTerms = queryTokens.filter(t => !stopWords.includes(t));

                    const excerpt = getExcerpt(bestMatch.text, searchTerms, 180);
                    const highlightedExcerpt = highlightText(excerpt, searchTerms);
                    const typeLabel = typeIcons[bestMatch.type] || docTypeLabel;

                    const responseHtml = `
                        <div class="keyword-match-card">
                            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; font-weight: 700; margin-bottom: 2px;">
                                ${typeLabel} Match
                            </div>

                                ${bestMatch.title}

                                Read Full Document →
                            </a>
                        </div>
                    `;

                    return {
                        answer: responseHtml,
                        confidence: 1.0,
                        category: bestMatch.url.includes('/teaching') ? 'Teaching' : (bestMatch.type === 'publication' || bestMatch.type === 'talk' ? 'Research' : 'Bio/Contact'),
                        followups: [],
                        sourceTitle: bestMatch.title,

                }
            }

            return {
                answer: `I am not sure about that, but you can explore these topics:<br>
                    <div class="chatbot-chips">
                        <button class="chatbot-chip" data-question="What courses does TJ teach?">🎓 OMSCS & Teaching</button>

                    </div>`,

                followups: []
            };
        }
    });
